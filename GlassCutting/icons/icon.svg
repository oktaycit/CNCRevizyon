<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Arka plan -->
  <rect x="4" y="4" width="120" height="120" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Cam levha -->
  <rect x="28" y="36" width="72" height="56" rx="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Kesim yolu -->
  <path d="M 36 64 L 64 64 L 64 84" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Kesim noktası -->
  <circle cx="64" cy="84" r="6" fill="#FF5722"/>
  <circle cx="64" cy="84" r="3" fill="#FFF"/>
  
  <!-- Eksen okları -->
  <path d="M 28 100 L 100 100" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 100 100 L 92 96 M 100 100 L 92 104" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <path d="M 28 100 L 28 28" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 28 28 L 24 36 M 28 28 L 32 36" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- X etiketi -->
  <text x="104" y="105" font-family="Arial" font-size="14" font-weight="bold" fill="#FF6B6B">X</text>
  
  <!-- Y etiketi -->
  <text x="18" y="26" font-family="Arial" font-size="14" font-weight="bold" fill="#4ECDC4">Y</text>
</svg>
