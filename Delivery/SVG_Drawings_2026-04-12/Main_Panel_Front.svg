  <rect class="part pwr" x="450" y="530" width="105" height="130"/>
  <rect class="part pwr" x="580" y="548" width="18" height="78"/>
  <rect class="part pwr" x="607" y="548" width="18" height="78"/>
  <rect class="part pwr" x="634" y="548" width="18" height="78"/>
  <rect class="part saf" x="661" y="548" width="18" height="78"/>
  <rect class="part pwr" x="688" y="548" width="18" height="78"/>
  <rect class="part term" x="735" y="550" width="80" height="54"/>
  <rect class="part saf" x="835" y="550" width="62" height="54"/>
  <rect class="part saf" x="915" y="550" width="98" height="54"/>
  <text class="sm" x="302" y="602" text-anchor="middle">Q1</text>
  <text class="sm" x="397" y="602" text-anchor="middle">K1</text>
  <text class="sm" x="502" y="602" text-anchor="middle">PS1</text>
  <text class="tiny" x="589" y="592" text-anchor="middle">F2</text>
  <text class="tiny" x="616" y="592" text-anchor="middle">F3</text>
  <text class="tiny" x="643" y="592" text-anchor="middle">F4</text>
  <text class="tiny" x="670" y="592" text-anchor="middle">F5</text>
  <text class="tiny" x="697" y="592" text-anchor="middle">F6</text>
  <text class="sm" x="775" y="582" text-anchor="middle">X2</text>
  <text class="sm" x="866" y="582" text-anchor="middle">X10</text>
  <text class="sm" x="964" y="582" text-anchor="middle">X11</text>

