  <text class="sm" x="528" y="1296" text-anchor="middle">X30</text>
  <text class="sm" x="713" y="1296" text-anchor="middle">X40</text>
  <text class="sm" x="849" y="1296" text-anchor="middle">K10</text>
  <text class="sm" x="911" y="1296" text-anchor="middle">FK1</text>

  <!-- rail 4 -->
  <rect class="part term" x="260" y="1545" width="56" height="56"/>
  <circle cx="395" cy="1573" r="18" fill="#fff2bf" stroke="#202020" stroke-width="1.8"/>
  <rect class="part pwr" x="575" y="1538" width="58" height="76"/>
  <text class="sm" x="288" y="1578" text-anchor="middle">X12</text>
  <text class="sm" x="395" y="1578" text-anchor="middle">S2</text>
  <text class="sm" x="604" y="1581" text-anchor="middle">X1</text>

  <!-- clean notes -->
  <rect x="920" y="1640" width="290" height="180" fill="#fff" stroke="#b0b0b0" stroke-width="1.5" rx="6"/>
  <text class="txt" x="945" y="1670">Temel Notlar</text>
  <text class="sm" x="945" y="1702">- U1 NC300 pano kapaginda</text>
  <text class="sm" x="945" y="1730">- disaridan servis/operator erisimi</text>
  <text class="sm" x="945" y="1758">- U2 operator paneli harici ayakli tip</text>
  <text class="sm" x="945" y="1786">- E-STOP operator paneline tasinmistir</text>

  <!-- simple legend -->
  <rect x="1235" y="620" width="150" height="170" fill="#fff" stroke="#b0b0b0" stroke-width="1.5" rx="6"/>
  <text class="sm" x="1260" y="648">Lejant</text>
  <rect class="pwr" x="1260" y="664" width="22" height="16" stroke="#202020" stroke-width="1"/>
  <text class="tiny" x="1292" y="677">Guc</text>
  <rect class="drv" x="1260" y="692" width="22" height="16" stroke="#202020" stroke-width="1"/>
  <text class="tiny" x="1292" y="705">Servo</text>
  <rect class="io" x="1260" y="720" width="22" height="16" stroke="#202020" stroke-width="1"/>
  <text class="tiny" x="1292" y="733">I/O</text>
  <rect class="saf" x="1260" y="748" width="22" height="16" stroke="#202020" stroke-width="1"/>
  <text class="tiny" x="1292" y="761">Safety</text>
