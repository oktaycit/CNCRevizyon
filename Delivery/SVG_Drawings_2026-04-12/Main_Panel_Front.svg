  <rect class="part drv" x="260" y="900" width="90" height="250"/>
  <rect class="part drv" x="370" y="900" width="70" height="250"/>
  <rect class="part drv" x="460" y="900" width="70" height="250"/>
  <rect class="part drv" x="550" y="900" width="54" height="250"/>
  <rect class="part drv" x="624" y="900" width="54" height="250"/>
  <rect class="part io" x="710" y="955" width="52" height="92"/>
  <rect class="part io" x="778" y="955" width="52" height="92"/>
  <rect class="part io" x="846" y="955" width="52" height="92"/>
  <rect class="part io" x="914" y="955" width="52" height="92"/>
  <text class="sm" x="305" y="1030" text-anchor="middle">U41</text>
  <text class="sm" x="405" y="1030" text-anchor="middle">U42</text>
  <text class="sm" x="495" y="1030" text-anchor="middle">U43</text>
  <text class="sm" x="577" y="1030" text-anchor="middle">U44</text>
  <text class="sm" x="651" y="1030" text-anchor="middle">U45</text>
  <text class="sm" x="736" y="1008" text-anchor="middle">U50</text>
