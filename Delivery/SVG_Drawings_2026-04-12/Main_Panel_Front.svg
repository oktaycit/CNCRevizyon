<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="2100" viewBox="0 0 1500 2100">
  <defs>
    <style>
      .bg { fill: #f5f4ef; }
      .panel { fill: #fff; stroke: #202020; stroke-width: 4; }
      .door { fill: #f7f9fb; stroke: #5a5a5a; stroke-width: 2; stroke-dasharray: 8 6; }
      .plate { fill: #fcfcfc; stroke: #8a8a8a; stroke-width: 1.8; stroke-dasharray: 10 8; }
      .rail { stroke: #7b7b7b; stroke-width: 2; }
      .part { stroke: #202020; stroke-width: 1.8; rx: 6; ry: 6; }
      .pwr { fill: #fde7c7; }
      .drv { fill: #dcecff; }
      .io { fill: #dff3e7; }
      .saf { fill: #fff2bf; }
      .term { fill: #efe3fb; }
      .ctrl { fill: #dbe8f6; }
      .title { font-family: Arial, sans-serif; font-size: 34px; font-weight: bold; fill: #111; }
      .sub { font-family: Arial, sans-serif; font-size: 19px; fill: #333; }
      .txt { font-family: Arial, sans-serif; font-size: 16px; fill: #1f1f1f; }
      .sm { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .tiny { font-family: Arial, sans-serif; font-size: 12px; fill: #444; }
      .dim { stroke: #707070; stroke-width: 1.5; marker-start: url(#arrow); marker-end: url(#arrow); }
      .tick { stroke: #707070; stroke-width: 1.5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#707070"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="2100"/>

  <text class="title" x="750" y="60" text-anchor="middle">GFB60-30RE Ana Pano - Duzenlenmis On Gorunus</text>
  <text class="sub" x="750" y="95" text-anchor="middle">1200 x 2000 x 600 mm / NC300 kapak montajli / U2 operator terminali harici saha tipi</text>

  <!-- overall cabinet -->
  <rect class="panel" x="120" y="140" width="1200" height="1800" rx="8"/>
  <rect class="door" x="150" y="170" width="1140" height="1740" rx="6"/>
  <rect class="plate" x="220" y="240" width="1000" height="1620"/>

  <text class="txt" x="230" y="228">Montaj Plakasi</text>
  <text class="txt" x="1040" y="195">Pano Kapagi</text>

  <!-- dimensions -->
  <line class="dim" x1="120" y1="105" x2="1320" y2="105"/>
  <line class="tick" x1="120" y1="125" x2="120" y2="80"/>
  <line class="tick" x1="1320" y1="125" x2="1320" y2="80"/>
  <text class="txt" x="720" y="98" text-anchor="middle">1200 mm</text>

  <line class="dim" x1="80" y1="140" x2="80" y2="1940"/>
  <line class="tick" x1="100" y1="140" x2="50" y2="140"/>
  <line class="tick" x1="100" y1="1940" x2="50" y2="1940"/>
  <text class="txt" x="60" y="1040" transform="rotate(-90 60,1040)" text-anchor="middle">2000 mm</text>

  <!-- NC300 on door -->
  <rect class="part ctrl" x="930" y="350" width="250" height="170"/>
  <rect x="965" y="385" width="150" height="84" fill="#d7e8f5" stroke="#202020" stroke-width="1.5" rx="4"/>
  <text class="txt" x="1055" y="442" text-anchor="middle">U1 NC300</text>
  <text class="sm" x="1055" y="486" text-anchor="middle">kapak montaj / dis erisim</text>

