  <text class="tiny" x="1292" y="789">Terminal</text>

  <text class="sm" x="120" y="2025">Dosya: Main_Panel_Front.svg</text>
  <text class="sm" x="1320" y="2025" text-anchor="end">Rev. 12.04.2026</text>
