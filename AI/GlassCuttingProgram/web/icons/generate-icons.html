<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassCutting Pro - Icon Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #1976D2;
      text-align: center;
    }
    .info {
      background: #e3f2fd;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .icon-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .icon-item {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .icon-item canvas {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    .icon-item p {
      margin-top: 10px;
      font-weight: 600;
      color: #424242;
    }
    button {
      display: block;
      width: 100%;
      padding: 15px;
      background: #1976D2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover {
      background: #1565C0;
    }
    button:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }
    .status {
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-weight: 600;
      text-align: center;
    }
    .status.success {
      background: #e8f5e9;
      color: #388E3C;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
  </style>
</head>
<body>
  <h1>🎨 GlassCutting Pro - Icon Generator</h1>
  
  <div class="info">
    <h3>How to generate icons:</h3>
    <ol>
      <li>Click the <strong>"Generate & Download Icons"</strong> button below</li>
      <li>Each icon will be downloaded automatically</li>
      <li>Save the icons in the <code>icons/</code> folder</li>
      <li>Or use a tool to combine them into a .icns or .ico file</li>
    </ol>
  </div>
  
  <button id="btnGenerate">Generate & Download Icons</button>
  <button id="btnDownloadAll">Download as ZIP (requires JSZip)</button>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <h2>Icon Preview:</h2>
  <div class="icon-container" id="iconContainer"></div>
  
  <script>
    const iconSizes = [16, 32, 48, 64, 128, 256, 512];
    
    // Draw icon on canvas
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;
      
      const scale = size / 512;
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#1976D2');
      gradient.addColorStop(1, '#1565C0');
      
      // Rounded rectangle background
      const radius = 80 * scale;
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.fill();
      
      // Glass pane (rectangle)
      const glassMargin = 100 * scale;
      const glassWidth = size - glassMargin * 2;
      const glassHeight = size * 0.5;
      const glassX = glassMargin;
      const glassY = size * 0.25;
      
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.fillRect(glassX, glassY, glassWidth, glassHeight);
      
      // Glass border
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.lineWidth = 4 * scale;
      ctx.strokeRect(glassX, glassY, glassWidth, glassHeight);
      
      // Cutting line (diagonal)
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 6 * scale;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(glassX + glassWidth * 0.2, glassY + glassHeight * 0.2);
      ctx.lineTo(glassX + glassWidth * 0.8, glassY + glassHeight * 0.8);
      ctx.stroke();
      
      // Cutting head (circle)
      const headX = glassX + glassWidth * 0.8;
      const headY = glassY + glassHeight * 0.8;
      const headRadius = 20 * scale;
      
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3 * scale;
      ctx.stroke();
      
      // Checkmark
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 8 * scale;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(size * 0.3, size * 0.5);
      ctx.lineTo(size * 0.45, size * 0.65);
      ctx.lineTo(size * 0.7, size * 0.35);
      ctx.stroke();
      
      // Highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.beginPath();
      ctx.ellipse(size * 0.3, size * 0.3, size * 0.15, size * 0.08, Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Generate all icons
    function generateIcons() {
      const container = document.getElementById('iconContainer');
      container.innerHTML = '';
      
      iconSizes.forEach(size => {
        const item = document.createElement('div');
        item.className = 'icon-item';
        
        const canvas = document.createElement('canvas');
        const title = document.createElement('p');
        title.textContent = `${size}x${size}`;
        
        drawIcon(canvas, size);
        
        item.appendChild(canvas);
        item.appendChild(title);
        container.appendChild(item);
      });
    }
    
    // Download canvas as PNG
    function downloadCanvas(canvas, filename) {
      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);
          resolve();
        });
      });
    }
    
    // Generate and download all icons
    async function generateAndDownload() {
      const status = document.getElementById('status');
      status.style.display = 'block';
      status.className = 'status';
      status.textContent = 'Generating icons...';
      
      try {
        for (const size of iconSizes) {
          const canvas = document.createElement('canvas');
          drawIcon(canvas, size);
          await downloadCanvas(canvas, `icon${size}.png`);
          status.textContent = `Downloaded icon${size}.png`;
          await new Promise(resolve => setTimeout(resolve, 100));
        }
        
        status.className = 'status success';
        status.textContent = '✅ All icons downloaded successfully!';
      } catch (error) {
        status.className = 'status error';
        status.textContent = '❌ Error downloading icons: ' + error.message;
      }
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      generateIcons();
      
      document.getElementById('btnGenerate').addEventListener('click', generateAndDownload);
      
      document.getElementById('btnDownloadAll').addEventListener('click', () => {
        alert('To download all icons as ZIP, you can:\n\n1. Use an online tool to combine PNGs\n2. Or use a command-line tool like:\n   zip icons.zip icon*.png');
      });
    });
  </script>
</body>
</html>
